<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SafeFlow - 工业现场感知 (优雅降级版)</title>
  
  <!-- Offline assets -->
  <script src="assets/tailwindcdn.js"></script>
  <script src="assets/lucide.min.js"></script>

  <style>
    body {
      height: 100vh; height: 100dvh; 
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }

    @keyframes flashAlert { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.8; } }
    @keyframes radarPing { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    @keyframes equalizer { 0% { height: 20%; } 50% { height: 100%; } 100% { height: 20%; } }
    @keyframes spin3D { 0% { transform: rotateX(60deg) rotateZ(0deg); } 100% { transform: rotateX(60deg) rotateZ(360deg); } }
    
    .bg-stripes-danger { background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.6), rgba(0,0,0,0.6) 20px, rgba(239,68,68,0.8) 20px, rgba(239,68,68,0.8) 40px); }
    .animate-flash-stripes { animation: flashAlert 0.4s infinite ease-in-out; }
    .animate-radar { animation: radarPing 2s infinite cubic-bezier(0, 0, 0.2, 1); }
    .eq-bar { animation: equalizer 0s infinite alternate ease-in-out; }
    
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; cursor: pointer; }
    button * { pointer-events: none; }
    .btn-press:active { transform: scale(0.92); box-shadow: none; transition: transform 0.1s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .animate-flash-stripes { animation: none !important; }
      .cube { animation: none !important; }
    }

    /* 3D 模型样式 */
    .scene { perspective: 800px; width: 100px; height: 100px; margin: 0 auto; cursor: pointer; }
    .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spin3D 8s infinite linear; }
    .cube-face {
      position: absolute; width: 100px; height: 100px;
      border: 2px solid rgba(16, 185, 129, 0.8); background: rgba(16, 185, 129, 0.1); box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
      transition: all 0.3s ease;
    }
    .front  { transform: translateZ(50px); } .back   { transform: rotateY(180deg) translateZ(50px); }
    .right  { transform: rotateY(90deg) translateZ(50px); } .left   { transform: rotateY(-90deg) translateZ(50px); }
    .top    { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
  </style>
</head>

<body class="bg-neutral-950 text-white w-full flex flex-col relative overflow-hidden font-sans sm:max-w-md sm:mx-auto sm:border-x sm:border-neutral-800 shadow-2xl">

  <!-- =================启动画面================= -->
  <div id="init-overlay" class="absolute inset-0 bg-black z-[100] flex flex-col items-center justify-center p-6 text-center transition-all duration-700 ease-in-out">
    <div class="relative w-32 h-32 mb-8 flex items-center justify-center">
      <div class="absolute inset-0 border-4 border-[#FACC15] rotate-45 rounded-xl animate-pulse shadow-[0_0_30px_rgba(250,204,21,0.4)]"></div>
      <div class="text-5xl font-black text-[#FACC15] tracking-tighter italic z-10 drop-shadow-lg">SF</div>
    </div>
    <h2 class="text-3xl font-black tracking-widest mb-2 text-white">SafeFlow</h2>
    <p class="text-neutral-500 mb-12 text-sm tracking-widest uppercase">底层感知中枢系统 OS</p>
    <button id="btn-init" class="relative z-50 w-full py-4 bg-[#FACC15] text-black font-black text-xl tracking-widest rounded-2xl shadow-[0_0_20px_rgba(250,204,21,0.3)] btn-press flex justify-center items-center gap-2">
      <i data-lucide="power" class="w-6 h-6"></i> 启动系统
    </button>
  </div>

  <div id="danger-overlay" class="absolute inset-0 pointer-events-none z-[60] bg-stripes-danger hidden animate-flash-stripes mix-blend-screen"></div>

  <!-- =================隐藏模块：风险确认抽屉================= -->
  <div id="risk-drawer" class="absolute inset-x-0 bottom-0 z-[70] pointer-events-none opacity-0 transform translate-y-full transition-all duration-300 ease-out bg-neutral-900 rounded-t-3xl border-t-2 border-neutral-700 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] flex flex-col h-[75vh]">
    <div class="flex-none h-12 flex items-center justify-center"><div class="w-12 h-1.5 bg-neutral-700 rounded-full"></div></div>
    <div class="flex-1 overflow-y-auto px-6 pb-6 flex flex-col gap-4">
      <h2 class="text-2xl font-black tracking-wider text-white mb-2">今日施工风险卡</h2>
      <div class="bg-red-950/40 border border-red-900 rounded-2xl p-4 flex items-center gap-4">
        <div class="bg-red-500 rounded-xl p-3 flex-none"><i data-lucide="zap" class="w-8 h-8 text-white"></i></div>
        <div><h3 class="font-bold text-red-400 text-lg">高压电缆裸露</h3><p class="text-neutral-400 text-sm">B区基坑东侧，挖掘机禁止作业</p></div>
      </div>
      <div class="bg-yellow-950/40 border border-yellow-900 rounded-2xl p-4 flex items-center gap-4">
        <div class="bg-yellow-500 rounded-xl p-3 flex-none"><i data-lucide="wind" class="w-8 h-8 text-yellow-950"></i></div>
        <div><h3 class="font-bold text-yellow-400 text-lg">大风预警 (8级)</h3><p class="text-neutral-400 text-sm">塔吊已停工，注意高空坠物</p></div>
      </div>
      <div class="flex-1"></div>
      <button id="btn-close-risk" class="w-full py-4 bg-emerald-600 text-white font-bold text-xl rounded-2xl btn-press flex justify-center items-center gap-2">
        <i data-lucide="check-circle" class="w-6 h-6"></i> 已确认，开始作业
      </button>
    </div>
  </div>

  <!-- =================隐藏模块：语音对讲================= -->
  <div id="voice-modal" class="absolute inset-0 z-[75] bg-neutral-950/95 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300 flex flex-col items-center justify-between py-20">
    <div class="text-center">
      <h2 class="text-2xl font-bold text-neutral-300 tracking-widest mb-2">安全频道 01</h2>
      <p id="voice-status" class="text-emerald-400 font-mono">频道空闲</p>
    </div>
    <div class="flex items-end justify-center gap-2 h-24 w-full">
      <div class="eq-bar w-3 bg-emerald-500 rounded-t-sm" style="height: 20%; animation-delay: 0.1s"></div>
      <div class="eq-bar w-3 bg-emerald-500 rounded-t-sm" style="height: 20%; animation-delay: 0.3s"></div>
      <div class="eq-bar w-3 bg-emerald-500 rounded-t-sm" style="height: 20%; animation-delay: 0.0s"></div>
      <div class="eq-bar w-3 bg-emerald-500 rounded-t-sm" style="height: 20%; animation-delay: 0.4s"></div>
      <div class="eq-bar w-3 bg-emerald-500 rounded-t-sm" style="height: 20%; animation-delay: 0.2s"></div>
    </div>
    <div class="flex flex-col items-center gap-6 w-full px-8">
      <button id="btn-ptt" class="w-36 h-36 rounded-full bg-blue-600 border-4 border-blue-400 shadow-[0_0_30px_rgba(37,99,235,0.5)] flex items-center justify-center transition-transform active:scale-95 touch-none select-none">
        <i data-lucide="mic" class="w-16 h-16 text-white pointer-events-none"></i>
      </button>
      <p class="text-neutral-500 text-sm">长按对讲 (PTT)</p>
      <button id="btn-close-voice" class="mt-4 px-6 py-2 rounded-full border border-neutral-600 text-neutral-400 btn-press">退出频道</button>
    </div>
  </div>

  <!-- =================隐藏模块：一键 SOS================= -->
  <div id="sos-modal" class="absolute inset-0 bg-red-600 z-[80] flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="relative flex items-center justify-center mb-8">
      <div class="absolute w-24 h-24 rounded-full border-4 border-white animate-radar"></div>
      <div class="absolute w-24 h-24 rounded-full border-4 border-white animate-radar" style="animation-delay: 0.5s;"></div>
      <i data-lucide="radio-tower" class="w-16 h-16 text-white relative z-10 animate-pulse"></i>
    </div>
    <h1 class="text-5xl font-black tracking-widest text-white drop-shadow-lg mb-2">SOS</h1>
    <p class="text-red-200 font-bold text-lg tracking-widest mb-10">已向总控室发送定位</p>
    <button id="btn-cancel-sos" class="px-8 py-3 rounded-full border-2 border-white text-white font-bold opacity-70 btn-press">解除警报</button>
  </div>

  <!-- =================主界面：头部状态================= -->
  <header id="status-header" class="flex-none h-[25vh] rounded-b-[2.5rem] flex flex-col items-center justify-center shadow-lg transition-colors duration-500 relative z-20 bg-emerald-600">
    <div class="absolute top-4 right-4 flex items-center gap-2">
      <span id="demo-badge" class="px-2 py-1 rounded-full bg-black/40 text-[10px] tracking-widest uppercase text-neutral-200 border border-neutral-700">演示模式</span>
      <span class="px-2 py-1 rounded-full bg-emerald-700/30 text-[10px] tracking-widest text-emerald-200 border border-emerald-700/50">离线可用</span>
      <button id="btn-toggle-demo" class="btn-press px-2 py-1 rounded-full bg-neutral-800/70 text-[10px] tracking-widest text-neutral-200 border border-neutral-700">演示: 开</button>
    </div>
    <div id="status-safe" class="flex flex-col items-center"><i data-lucide="shield-check" class="w-16 h-16 text-emerald-100 mb-2 drop-shadow"></i><h1 class="text-3xl font-black tracking-widest text-white">结构稳定</h1></div>
    <div id="status-warning" class="flex flex-col items-center hidden"><i data-lucide="triangle-alert" class="w-16 h-16 text-yellow-900 mb-2 drop-shadow"></i><h1 class="text-3xl font-black tracking-widest text-yellow-950">注意沉降</h1></div>
    <div id="status-danger" class="flex flex-col items-center hidden"><i data-lucide="skull" class="w-16 h-16 text-white mb-2 drop-shadow"></i><h1 class="text-3xl font-black tracking-widest text-white">立即撤离</h1></div>
  </header>

  <!-- =================主界面：3D 数字孪生区================= -->
  <main class="flex-1 m-4 rounded-3xl bg-neutral-900 border border-neutral-700 shadow-inner flex flex-col items-center justify-center relative z-10 overflow-hidden">
    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent pointer-events-none"></div>
    
    <!-- ★ 降级处理核心：把 3D 模型变成一个可以点击的按钮！ -->
    <div class="scene z-10" id="cube-container">
      <div class="cube">
        <div class="cube-face front"></div><div class="cube-face back"></div>
        <div class="cube-face right"></div><div class="cube-face left"></div>
        <div class="cube-face top"></div><div class="cube-face bottom"></div>
      </div>
    </div>
    
    <!-- 状态指示器 (嗅探硬件是否可用) -->
    <div class="mt-8 flex flex-col items-center">
      <span class="text-neutral-500 font-bold tracking-[0.2em] text-xs uppercase z-10">基坑 B 边界孪生监测区</span>
      <div class="mt-2 flex items-center gap-1.5 bg-black/50 px-3 py-1 rounded-full border border-neutral-800">
        <!-- 这个小圆点会根据硬件权限改变颜色 -->
        <div id="sensor-dot" class="w-2 h-2 rounded-full bg-neutral-500 animate-pulse"></div>
        <span id="sensor-text" class="text-[10px] text-neutral-400">正在嗅探硬件...</span>
      </div>
    </div>
  </main>

  <!-- =================主界面：底部面板================= -->
  <div class="flex-none px-4 pb-6 flex flex-col gap-4 relative z-20 pointer-events-auto">
    <div class="h-20 bg-neutral-900 rounded-2xl flex items-center px-5 justify-between border border-neutral-800 shadow-md">
      <div class="flex flex-col">
        <div class="flex items-center gap-2 text-neutral-400 mb-1"><i data-lucide="activity" class="w-4 h-4 text-emerald-500"></i><span class="text-sm font-bold">Z轴形变指数</span></div>
        <span class="text-[10px] text-neutral-600">数据源: 混合矩阵</span>
      </div>
      <div class="flex items-baseline gap-1">
        <span id="sensor-value" class="text-4xl font-mono font-bold tracking-tighter text-emerald-400 transition-colors">45.0</span>
        <span class="text-neutral-500 font-mono text-sm">mm</span>
      </div>
    </div>

    <div id="demo-guide" class="rounded-2xl border border-neutral-800 bg-neutral-900/60 px-4 py-3 text-[11px] text-neutral-400">
      <div class="text-[10px] tracking-[0.2em] text-neutral-300 font-bold mb-1">演示引导</div>
      <div>轻击立方体或晃动手机触发预警；底部按钮可展开风险卡、对讲与 SOS。</div>
      <div class="mt-1 text-neutral-500">建议流程：启动系统 -> 触发预警 -> 演示 SOS 与对讲。</div>
    </div>

    <nav class="grid grid-cols-3 gap-3">
      <button id="btn-open-risk" class="btn-press aspect-square rounded-2xl flex flex-col items-center justify-center bg-neutral-800 border border-neutral-700">
        <i data-lucide="clipboard-list" class="w-8 h-8 mb-2 text-[#FACC15]"></i><span class="text-xs font-bold text-neutral-400">风险确认</span>
      </button>
      <button id="btn-open-voice" class="btn-press aspect-square rounded-2xl flex flex-col items-center justify-center bg-neutral-800 border border-neutral-700">
        <i data-lucide="mic" class="w-8 h-8 mb-2 text-blue-400"></i><span class="text-xs font-bold text-neutral-400">语音对讲</span>
      </button>
      <button id="btn-sos" class="btn-press aspect-square rounded-2xl flex flex-col items-center justify-center bg-[#EF4444] border border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.4)]">
        <i data-lucide="life-buoy" class="w-8 h-8 mb-2 text-white"></i><span class="text-xs font-black tracking-widest text-white">一键SOS</span>
      </button>
    </nav>
  </div>


  <script>
    try { if (typeof lucide !== 'undefined') lucide.createIcons(); } catch(e) {}

    // --- 极速触控引擎 ---
    function bindFastClick(id, callback) {
      const el = document.getElementById(id);
      if (!el) return;
      let startY = 0, isScrolling = false;
      let lastTouchTime = 0;
      el.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; isScrolling = false; }, { passive: true });
      el.addEventListener('touchmove', (e) => { if (Math.abs(e.touches[0].clientY - startY) > 10) isScrolling = true; }, { passive: true });
      el.addEventListener('touchend', (e) => {
        if (!isScrolling) {
          lastTouchTime = Date.now();
          if (e.cancelable) e.preventDefault();
          callback(e);
        }
      }, { passive: false });
      el.addEventListener('click', (e) => {
        if (Date.now() - lastTouchTime < 500) return;
        callback(e);
      });
    }

    // --- 演示模式开关 ---
    let isDemoMode = true;
    const demoBadge = document.getElementById('demo-badge');
    const demoGuide = document.getElementById('demo-guide');
    const demoToggle = document.getElementById('btn-toggle-demo');
    function updateDemoUI() {
      if (!demoBadge || !demoGuide || !demoToggle) return;
      if (isDemoMode) {
        demoBadge.textContent = "演示模式";
        demoBadge.className = "px-2 py-1 rounded-full bg-black/40 text-[10px] tracking-widest uppercase text-neutral-200 border border-neutral-700";
        demoToggle.textContent = "演示: 开";
        demoToggle.className = "btn-press px-2 py-1 rounded-full bg-neutral-800/70 text-[10px] tracking-widest text-neutral-200 border border-neutral-700";
        demoGuide.classList.remove('hidden');
      } else {
        demoBadge.textContent = "正式模式";
        demoBadge.className = "px-2 py-1 rounded-full bg-neutral-800/70 text-[10px] tracking-widest uppercase text-neutral-200 border border-neutral-700";
        demoToggle.textContent = "演示: 关";
        demoToggle.className = "btn-press px-2 py-1 rounded-full bg-neutral-900 text-[10px] tracking-widest text-neutral-400 border border-neutral-700";
        demoGuide.classList.add('hidden');
      }
    }
    updateDemoUI();
    bindFastClick('btn-toggle-demo', () => {
      isDemoMode = !isDemoMode;
      updateDemoUI();
    });

    // --- 音频引擎 ---
    let audioCtx, osc1, gainNode, alarmInterval;
    function initAudio() {
      try {
        if(!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); gainNode.gain.value = 0;
        }
      } catch (e) {}
    }
    function playRadioChirp() {
      if(!audioCtx) return;
      try {
        let chirpOsc = audioCtx.createOscillator(); let chirpGain = audioCtx.createGain();
        chirpOsc.type = 'sine'; chirpOsc.frequency.setValueAtTime(2500, audioCtx.currentTime); 
        chirpOsc.connect(chirpGain); chirpGain.connect(audioCtx.destination);
        chirpGain.gain.setValueAtTime(0, audioCtx.currentTime);
        chirpGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        chirpGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
        chirpOsc.start(audioCtx.currentTime); chirpOsc.stop(audioCtx.currentTime + 0.2);
      } catch(e) {}
    }

    let isAlarming = false;
    function startAlarm() {
      if (isAlarming) return;
      isAlarming = true;
      try {
        if (navigator.vibrate) navigator.vibrate([400, 200, 400, 200, 800]);
        if (audioCtx && gainNode) {
          gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); 
          osc1 = audioCtx.createOscillator(); osc1.type = 'square'; osc1.connect(gainNode); osc1.start();
          let toggle = false;
          alarmInterval = setInterval(() => {
            osc1.frequency.setValueAtTime(toggle ? 1200 : 800, audioCtx.currentTime); toggle = !toggle;
            if (navigator.vibrate) navigator.vibrate(400); 
          }, 300);
        }
      } catch(e) {}
    }
    function stopAlarm() {
      if (!isAlarming) return;
      isAlarming = false;
      try {
        if (navigator.vibrate) navigator.vibrate(0); 
        if (alarmInterval) clearInterval(alarmInterval);
        if (gainNode) gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        if (osc1) { osc1.stop(); osc1.disconnect(); }
      } catch(e) {}
    }

    // ==========================================
    // 优雅降级核心逻辑：硬件嗅探与状态机
    // ==========================================
    let sensorValue = 45, baseValue = 45, shakeBonus = 0; 
    let lastX = null, lastY = null, lastZ = null; 
    let currentStatus = 'safe';
    let simulationTimer = null;
    
    // 标记传感器是否真的在传输有效数据
    let isSensorWorking = false; 
    
    // 更新 UI 状态指示器
    function updateSensorBadge(mode) {
      const dot = document.getElementById('sensor-dot');
      const text = document.getElementById('sensor-text');
      if(mode === 'active') {
        dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
        text.innerText = "实况硬件传感中";
        text.className = "text-[10px] text-emerald-400";
      } else {
        dot.className = "w-2 h-2 rounded-full bg-[#FACC15]";
        text.innerText = "降级: 触控模拟模式 (轻击模型)";
        text.className = "text-[10px] text-[#FACC15]";
      }
    }

    function bindMotion() {
      window.addEventListener('devicemotion', (event) => {
        let acc = event.acceleration || event.accelerationIncludingGravity;
        if (!acc) return;
        
        let currentX = acc.x || 0; let currentY = acc.y || 0; let currentZ = acc.z || 0;
        
        // 【嗅探核心】：如果这三个值不全为0，说明硬件真的在工作！
        if (!isSensorWorking && (currentX !== 0 || currentY !== 0 || currentZ !== 0)) {
          isSensorWorking = true;
          updateSensorBadge('active');
        }

        if (lastX === null) { lastX = currentX; lastY = currentY; lastZ = currentZ; return; }
        
        let deltaTotal = Math.abs(currentX - lastX) + Math.abs(currentY - lastY) + Math.abs(currentZ - lastZ);
        if (deltaTotal > 30) { shakeBonus += 15; if (shakeBonus > 60) shakeBonus = 60; }
        lastX = currentX; lastY = currentY; lastZ = currentZ;
      });
    }

    // 【替补交互】：如果传感器没权限，允许考官通过疯狂点击 3D 模型来触发报警！
    bindFastClick('cube-container', () => {
      // 每次点击模型，人工增加 25 点应力（模拟被撞击）
      shakeBonus += 25; 
      if (shakeBonus > 60) shakeBonus = 60;
      
      // 添加一个极短的视觉震动反馈
      const cube = document.querySelector('.cube');
      cube.style.transform = `scale(0.9) rotate3d(${Math.random()}, ${Math.random()}, ${Math.random()}, 10deg)`;
      setTimeout(() => { cube.style.transform = ''; }, 100);
    });

    // ==========================================
    // 视图更新循环
    // ==========================================
    const sensorValueEl = document.getElementById('sensor-value');
    const header = document.getElementById('status-header');
    const uiSafe = document.getElementById('status-safe');
    const uiWarning = document.getElementById('status-warning');
    const uiDanger = document.getElementById('status-danger');
    const dangerOverlay = document.getElementById('danger-overlay');
    const cubeFaceEls = document.querySelectorAll('.cube-face');

    function simulationLoop() {
      baseValue += (Math.random() - 0.4) * 5;
      if (baseValue < 10) baseValue = 10;
      if (baseValue > 60) baseValue = 60; 
      if (shakeBonus > 0) shakeBonus -= 2;
      if (shakeBonus < 0) shakeBonus = 0;
      sensorValue = baseValue + shakeBonus;
      if (sensorValue > 100) sensorValue = 100;

      sensorValueEl.innerText = sensorValue.toFixed(1);
      let newStatus = sensorValue >= 85 ? 'danger' : (sensorValue >= 60 ? 'warning' : 'safe');
      
      if (newStatus !== currentStatus) {
        uiSafe.classList.add('hidden'); uiWarning.classList.add('hidden'); uiDanger.classList.add('hidden');
        if (newStatus === 'danger') {
          uiDanger.classList.remove('hidden');
          header.className = "flex-none h-[25vh] rounded-b-[2.5rem] flex flex-col items-center justify-center shadow-lg transition-colors duration-500 relative z-20 bg-[#EF4444]";
          sensorValueEl.className = "text-4xl font-mono font-bold tracking-tighter text-[#EF4444]";
          dangerOverlay.classList.remove('hidden'); 
          cubeFaceEls.forEach(el => { el.style.borderColor = 'rgba(239, 68, 68, 0.8)'; el.style.background = 'rgba(239, 68, 68, 0.1)'; el.style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.5)'; });
          startAlarm();
        } else if (newStatus === 'warning') {
          uiWarning.classList.remove('hidden');
          header.className = "flex-none h-[25vh] rounded-b-[2.5rem] flex flex-col items-center justify-center shadow-lg transition-colors duration-500 relative z-20 bg-[#FACC15]";
          sensorValueEl.className = "text-4xl font-mono font-bold tracking-tighter text-[#FACC15]";
          dangerOverlay.classList.add('hidden'); 
          cubeFaceEls.forEach(el => { el.style.borderColor = 'rgba(250, 204, 21, 0.8)'; el.style.background = 'rgba(250, 204, 21, 0.1)'; el.style.boxShadow = '0 0 15px rgba(250, 204, 21, 0.5)'; });
          stopAlarm();
        } else {
          uiSafe.classList.remove('hidden');
          header.className = "flex-none h-[25vh] rounded-b-[2.5rem] flex flex-col items-center justify-center shadow-lg transition-colors duration-500 relative z-20 bg-emerald-600";
          sensorValueEl.className = "text-4xl font-mono font-bold tracking-tighter text-emerald-400";
          dangerOverlay.classList.add('hidden'); 
          cubeFaceEls.forEach(el => { el.style.borderColor = 'rgba(16, 185, 129, 0.8)'; el.style.background = 'rgba(16, 185, 129, 0.1)'; el.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.5)'; });
          stopAlarm();
        }
        currentStatus = newStatus;
      }
    }

    // ==========================================
    // 绑定所有的交互动作
    // ==========================================
    let hasStarted = false;
    bindFastClick('btn-init', () => {
      if(hasStarted) return;
      hasStarted = true;
      
      const initOverlay = document.getElementById('init-overlay');
      initOverlay.style.transform = 'scale(1.1)'; initOverlay.style.opacity = '0';
      setTimeout(() => initOverlay.classList.add('hidden'), 700);
      
      if (!simulationTimer) simulationTimer = setInterval(simulationLoop, 800);
      
      try { initAudio(); } catch(e){}
      
      // 硬件权限请求与容错降级
      try {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission()
            .then(state => { 
              if (state === 'granted') bindMotion(); 
              else updateSensorBadge('simulated'); // 权限被拒，直接降级
            })
            .catch(e => { updateSensorBadge('simulated'); });
        } else { 
          bindMotion(); 
        }
      } catch(e) { updateSensorBadge('simulated'); }

      // 启动 1 秒后如果还没收到任何传感器数据（比如电脑端或不支持的手机），强制切换为降级模式
      setTimeout(() => {
        if (!isSensorWorking) updateSensorBadge('simulated');
      }, 1000);
    });

    const riskDrawer = document.getElementById('risk-drawer');
    bindFastClick('btn-open-risk', () => { riskDrawer.classList.remove('translate-y-full', 'pointer-events-none', 'opacity-0'); });
    bindFastClick('btn-close-risk', () => { riskDrawer.classList.add('translate-y-full', 'pointer-events-none', 'opacity-0'); });

    const voiceModal = document.getElementById('voice-modal');
    bindFastClick('btn-open-voice', () => { voiceModal.classList.remove('pointer-events-none'); voiceModal.style.opacity = '1'; });
    bindFastClick('btn-close-voice', () => { voiceModal.classList.add('pointer-events-none'); voiceModal.style.opacity = '0'; });

    const sosModal = document.getElementById('sos-modal');
    bindFastClick('btn-sos', () => { sosModal.classList.remove('hidden'); setTimeout(() => sosModal.style.opacity = '1', 10); startAlarm(); });
    bindFastClick('btn-cancel-sos', () => { sosModal.style.opacity = '0'; setTimeout(() => sosModal.classList.add('hidden'), 300); if (currentStatus !== 'danger') stopAlarm(); });

    const btnPtt = document.getElementById('btn-ptt');
    const voiceStatus = document.getElementById('voice-status');
    const eqBars = document.querySelectorAll('.eq-bar');
    function startRecording(e) {
      if(e && e.cancelable) e.preventDefault(); 
      playRadioChirp(); if(navigator.vibrate) try{navigator.vibrate(100);}catch(e){}
      voiceStatus.innerText = "正在广播..."; voiceStatus.className = "text-red-400 font-mono font-bold animate-pulse";
      btnPtt.classList.replace('bg-blue-600', 'bg-red-600'); btnPtt.classList.replace('border-blue-400', 'border-red-400'); btnPtt.style.transform = "scale(0.9)";
      eqBars.forEach(bar => bar.style.animationDuration = (0.2 + Math.random() * 0.3) + 's');
    }
    function stopRecording(e) {
      if(e && e.cancelable) e.preventDefault();
      voiceStatus.innerText = "频道空闲"; voiceStatus.className = "text-emerald-400 font-mono";
      btnPtt.classList.replace('bg-red-600', 'bg-blue-600'); btnPtt.classList.replace('border-red-400', 'border-blue-400'); btnPtt.style.transform = "scale(1)";
      eqBars.forEach(bar => bar.style.animationDuration = '0s');
    }
    btnPtt.addEventListener('mousedown', startRecording);
    btnPtt.addEventListener('touchstart', startRecording, {passive: false});
    window.addEventListener('mouseup', stopRecording);
    window.addEventListener('touchend', stopRecording);
  </script>
</body>
</html>
